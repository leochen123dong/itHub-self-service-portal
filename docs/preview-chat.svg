<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="logoGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2B6CB0"/>
      <stop offset="100%" stop-color="#ED8936"/>
    </linearGradient>
  </defs>

  <!-- bg -->
  <rect width="880" height="560" fill="#F7FAFC"/>

  <!-- top nav -->
  <rect x="0" y="0" width="880" height="60" fill="#FFFFFF"/>
  <line x1="0" y1="60" x2="880" y2="60" stroke="#E2E8F0"/>
  <rect x="24" y="14" width="32" height="32" rx="6" fill="url(#logoGrad2)"/>
  <text x="40" y="36" fill="#FFFFFF" font-size="18" font-weight="800" text-anchor="middle">I</text>
  <text x="68" y="36" fill="#2B6CB0" font-size="16" font-weight="700">ITHub 智能服务门户</text>
  <text x="220" y="34" fill="#718096" font-size="14">首页</text>
  <rect x="266" y="14" width="76" height="32" rx="6" fill="#EBF4FF"/>
  <text x="304" y="34" fill="#2B6CB0" font-size="14" font-weight="600" text-anchor="middle">AI助手</text>
  <text x="358" y="34" fill="#718096" font-size="14">知识库</text>
  <text x="428" y="34" fill="#718096" font-size="14">服务目录</text>
  <text x="500" y="34" fill="#718096" font-size="14">我的工单</text>
  <circle cx="772" cy="30" r="16" fill="#2B6CB0"/>
  <text x="772" y="35" fill="#FFFFFF" font-size="14" font-weight="600" text-anchor="middle">D</text>
  <text x="796" y="35" fill="#1A202C" font-size="14">demo.user</text>

  <!-- page header -->
  <text x="40" y="100" fill="#1A202C" font-size="22" font-weight="600">AI 助手</text>
  <text x="40" y="122" fill="#718096" font-size="13">和 AI 聊聊您的 IT 问题</text>

  <!-- chat container -->
  <rect x="40" y="148" width="800" height="380" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>

  <!-- messages area -->
  <!-- User message (right) -->
  <circle cx="700" cy="190" r="16" fill="#2B6CB0"/>
  <text x="700" y="195" fill="#FFFFFF" font-size="13" font-weight="600" text-anchor="middle">我</text>
  <rect x="450" y="174" width="240" height="44" rx="8" fill="#2B6CB0"/>
  <text x="464" y="195" fill="#FFFFFF" font-size="14">我的 VPN 连不上怎么办？</text>
  <text x="464" y="212" fill="#BEE3F8" font-size="12">已发送</text>

  <!-- AI message (left) -->
  <circle cx="64" cy="262" r="16" fill="#ED8936"/>
  <text x="64" y="267" fill="#FFFFFF" font-size="13" font-weight="600" text-anchor="middle">AI</text>
  <rect x="90" y="246" width="540" height="80" rx="8" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="104" y="270" fill="#1A202C" font-size="14" font-weight="600">VPN 故障排查建议</text>
  <text x="104" y="290" fill="#4A5568" font-size="13">1. 检查网络连接是否正常</text>
  <text x="104" y="308" fill="#4A5568" font-size="13">2. 确认 VPN 客户端版本为最新</text>
  <text x="104" y="326" fill="#4A5568" font-size="13">3. 联系网络管理员确认账号状态</text>

  <!-- Suggested action chips -->
  <rect x="90" y="338" width="140" height="28" rx="14" fill="#EBF4FF"/>
  <text x="160" y="356" fill="#2B6CB0" font-size="12" text-anchor="middle">📚 查看知识库文章</text>

  <rect x="238" y="338" width="100" height="28" rx="14" fill="#EBF4FF"/>
  <text x="288" y="356" fill="#2B6CB0" font-size="12" text-anchor="middle">重启 VPN 服务</text>

  <rect x="346" y="338" width="92" height="28" rx="14" fill="#FEEBC8"/>
  <text x="392" y="356" fill="#ED8936" font-size="12" text-anchor="middle">转人工 →</text>

  <!-- input bar -->
  <line x1="40" y1="448" x2="840" y2="448" stroke="#E2E8F0"/>
  <rect x="60" y="464" width="540" height="40" rx="8" fill="#FFFFFF" stroke="#CBD5E0"/>
  <text x="76" y="488" fill="#A0AEC0" font-size="13">输入您的问题，按 Enter 发送</text>

  <rect x="612" y="464" width="64" height="40" rx="8" fill="#2B6CB0"/>
  <text x="644" y="488" fill="#FFFFFF" font-size="14" text-anchor="middle">发送</text>

  <rect x="688" y="464" width="80" height="40" rx="8" fill="#ED8936"/>
  <text x="728" y="488" fill="#FFFFFF" font-size="14" text-anchor="middle">转人工</text>
</svg>