name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deploy; cancel in-progress ones on new push
concurrency:
  group: pages
  cancel-in-progress: true

# Required for `actions/deploy-pages` + OIDC
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        env:
          # GitHub Pages project page lives at /<repo>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          # Set this to your Render backend URL (no trailing slash).
          # Example: https://ithub-portal-server.onrender.com
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4